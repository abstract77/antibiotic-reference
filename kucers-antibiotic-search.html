<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Kucers' Antimicrobial Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg:#0e0f0d;--surface:#161714;--surface2:#1e1f1c;
  --border:#2a2b28;--text:#e8e4dc;--text-muted:#7a7870;
  --text-dim:#4a4b48;--accent:#c9a84c;--accent-dim:#8a6e2e;
  --accent-glow:rgba(201,168,76,0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Source Serif 4',Georgia,serif;
  display:flex;flex-direction:column;
  height:100dvh;
  -webkit-text-size-adjust:100%;
}

/* ── HEADER ── */
header{
  padding:12px 20px;
  padding-top:calc(12px + var(--safe-top));
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  background:var(--surface);flex-shrink:0;
}
.logo-block{flex:1;min-width:160px;}
.logo-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:2px;font-weight:300;}
h1{font-family:'Playfair Display',serif;font-size:clamp(15px,2vw,22px);font-weight:600;color:var(--text);}
h1 span{color:var(--accent);}
.stats-row{display:flex;gap:8px;}
.stat{text-align:center;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);}
.stat-n{font-family:'Playfair Display',serif;font-size:15px;color:var(--accent);line-height:1;}
.stat-label{font-size:8px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;font-weight:300;}

/* ── MOBILE TAB BAR ── */
.tab-bar{
  display:none;
  flex-shrink:0;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.tab-btn{
  flex:1;padding:10px 0;border:none;background:transparent;
  color:var(--text-muted);font-family:'Source Serif 4',serif;
  font-size:13px;cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.15s;
}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* ── LAYOUT ── */
.app{display:flex;flex:1;overflow:hidden;min-height:0;}

/* ── LEFT PANEL ── */
.panel-left{
  width:320px;min-width:260px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;background:var(--surface);flex-shrink:0;
}
.search-bar{padding:10px;border-bottom:1px solid var(--border);background:var(--surface2);}
.search-wrap{position:relative;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--accent-dim);font-size:15px;pointer-events:none;}
#searchInput{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 32px 10px 32px;color:var(--text);font-family:'Source Serif 4',serif;
  font-size:16px;/* 16px prevents iOS zoom */outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;
}
#searchInput:focus{border-color:var(--accent-dim);}
#searchInput::placeholder{color:var(--text-dim);font-style:italic;}
.clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--text-dim);border:none;border-radius:50%;width:18px;height:18px;color:var(--bg);font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.clear-btn.visible{display:flex;}
.filter-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.filter-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-family:'Source Serif 4',serif;transition:all 0.15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.filter-chip.active,.filter-chip:hover{background:var(--accent-glow);border-color:var(--accent-dim);color:var(--accent);}
.results-header{padding:7px 12px 5px;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);font-weight:300;border-bottom:1px solid var(--border);flex-shrink:0;}
.results-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.results-list::-webkit-scrollbar{width:3px;}
.results-list::-webkit-scrollbar-thumb{background:var(--border);}
.result-item{padding:11px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.1s;display:flex;align-items:flex-start;gap:9px;-webkit-tap-highlight-color:transparent;}
.result-item:active{background:var(--surface2);}
.result-item.active{background:var(--accent-glow);border-left:2px solid var(--accent);}
.result-num{font-family:'Playfair Display',serif;font-size:11px;color:var(--accent-dim);min-width:24px;padding-top:2px;}
.result-body{flex:1;min-width:0;}
.result-title{font-size:13px;color:var(--text);line-height:1.35;}
.result-title mark{background:var(--accent-glow);color:var(--accent);border-radius:2px;padding:0 1px;}
.result-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-style:italic;font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.result-pages{font-size:10px;color:var(--text-dim);white-space:nowrap;padding-top:2px;font-family:monospace;}
.empty-state{padding:40px 20px;text-align:center;color:var(--text-dim);font-style:italic;font-size:13px;font-weight:300;}

/* ── RIGHT PANEL ── */
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.chapter-header{padding:14px 24px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;display:none;}
.chapter-eyebrow{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent-dim);margin-bottom:4px;font-weight:300;}
.chapter-title{font-family:'Playfair Display',serif;font-size:clamp(14px,1.8vw,20px);font-weight:600;color:var(--text);line-height:1.25;margin-bottom:7px;}
.chapter-badges{display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:4px;}
.badge-pages{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dim);font-family:monospace;}
.badge-section{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);font-style:italic;font-weight:300;}
.badge-count{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* PDF nav */
.pdf-nav{padding:7px 16px;border-bottom:1px solid var(--border);display:none;align-items:center;gap:8px;background:var(--surface2);flex-shrink:0;flex-wrap:wrap;}
.pdf-nav.visible{display:flex;}
.nav-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 14px;color:var(--text-muted);font-family:'Source Serif 4',serif;font-size:13px;cursor:pointer;transition:all 0.15s;-webkit-tap-highlight-color:transparent;min-height:36px;}
.nav-btn:active:not(:disabled),.nav-btn:hover:not(:disabled){border-color:var(--accent-dim);color:var(--accent);}
.nav-btn:disabled{opacity:0.3;cursor:default;}
.page-info{font-size:11px;color:var(--text-muted);font-family:monospace;min-width:100px;text-align:center;}
.nav-spacer{flex:1;}
.zoom-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 11px;color:var(--text-muted);font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:36px;}
.zoom-btn:active,.zoom-btn:hover{border-color:var(--accent-dim);color:var(--accent);}
.zoom-level{font-size:10px;color:var(--text-dim);font-family:monospace;min-width:36px;text-align:center;}

/* PDF canvas */
.pdf-viewport{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#181816;display:none;flex-direction:column;align-items:center;padding:16px 10px;padding-bottom:calc(16px + var(--safe-bot));scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.pdf-viewport::-webkit-scrollbar{width:4px;}
.pdf-viewport::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#pdfCanvas{box-shadow:0 6px 32px rgba(0,0,0,0.6);display:block;max-width:100%;height:auto;}

/* States */
.welcome-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-dim);text-align:center;padding:40px;gap:10px;}
.welcome-ornament{font-size:48px;opacity:0.1;margin-bottom:6px;}
.welcome-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--text-muted);font-weight:400;}
.welcome-text{font-size:13px;font-weight:300;font-style:italic;color:var(--text-dim);max-width:280px;line-height:1.6;}
.loading-state{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--text-muted);}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;font-style:italic;font-weight:300;}
.error-state{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-muted);text-align:center;padding:40px;}
.error-icon{font-size:32px;opacity:0.35;}
.error-text{font-size:13px;font-style:italic;font-weight:300;max-width:320px;line-height:1.6;}

/* ── MOBILE (≤680px) ── */
@media (max-width:680px){
  header{padding:10px 16px;padding-top:calc(10px + var(--safe-top));}
  .stats-row{display:none;}
  .tab-bar{display:flex;}
  .app{flex-direction:column;}
  .panel-left{
    width:100%;border-right:none;
    flex:1;min-height:0;
    transition:display 0.15s;
  }
  .panel-left.hidden{display:none;}
  .panel-right{
    flex:1;min-height:0;
  }
  .panel-right.hidden{display:none;}
  .chapter-header{padding:12px 16px 10px;}
  .pdf-nav{padding:6px 10px;}
  .nav-btn,.zoom-btn{min-height:40px;}
  .page-info{font-size:10px;min-width:80px;}
}
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-eyebrow">Kucers' · 7th Edition</div>
    <h1>Antimicrobial <span>Reference</span></h1>
  </div>
  <div class="stats-row">

    <div class="stat"><div class="stat-n">5</div><div class="stat-label">Sections</div></div>
  </div>
</header>

<!-- Mobile tab bar -->
<div class="tab-bar" id="tabBar">

<div class="app">

      <div class="chapter-badges" id="chapterBadges"></div>

    <div class="pdf-nav" id="pdfNav">

      <div class="nav-spacer"></div>
      <button class="zoom-btn" id="zoomOut">−</button>
      <span class="zoom-level" id="zoomLevel">140%</span>
      <button class="zoom-btn" id="zoomIn">+</button>
    </div>
    <div class="welcome-state" id="welcomeState">
      <div class="welcome-ornament">☤</div>
      <div class="welcome-title">Select a chapter</div>
      <div class="welcome-text">Search or browse the list to open a chapter.</div>
    </div>
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Loading…</div>
    </div>
    <div class="error-state" id="errorState">

      <div class="error-text" id="errorText">Could not load the PDF.</div>
    </div>
    <div class="pdf-viewport" id="pdfViewport">
      <canvas id="pdfCanvas"></canvas>
    </div>
  </div>
</div>

const SECTION_KEYWORDS={antibiotics:['ANTIBIOTICS','QUINOLONES'],antifungal:['ANTIFUNGAL'],antiparasitic:['ANTIPARASITIC'],antiviral:['ANTIVIRAL']};

let currentFilter='all',currentQuery='',selectedIdx=null;
let pdfDoc=null,currentPage=1,chapterStart=1,chapterEnd=1,scale=1.4,renderTask=null;
let isMobile=()=>window.innerWidth<=680;

const $=id=>document.getElementById(id);
const searchInput=$('searchInput'),clearBtn=$('clearBtn'),resultsList=$('resultsList'),
  resultsHeader=$('resultsHeader'),chapterHeader=$('chapterHeader'),
  chapterEyebrow=$('chapterEyebrow'),chapterTitle=$('chapterTitle'),
  chapterBadges=$('chapterBadges'),welcomeState=$('welcomeState'),
  loadingState=$('loadingState'),loadingText=$('loadingText'),
  errorState=$('errorState'),errorText=$('errorText'),
  pdfViewport=$('pdfViewport'),pdfCanvas=$('pdfCanvas'),
  pdfNav=$('pdfNav'),prevBtn=$('prevBtn'),nextBtn=$('nextBtn'),
  pageInfo=$('pageInfo'),zoomIn=$('zoomIn'),zoomOut=$('zoomOut'),zoomLevel=$('zoomLevel'),
  panelLeft=$('panelLeft'),panelRight=$('panelRight'),
  tabSearch=$('tabSearch'),tabChapter=$('tabChapter');

// ── MOBILE TABS ─────────────────────────────────────────────────────────────
function switchTab(tab){
  if(!isMobile()) return;
  if(tab==='search'){
    panelLeft.classList.remove('hidden');
    panelRight.classList.add('hidden');
    tabSearch.classList.add('active');
    tabChapter.classList.remove('active');
  } else {
    panelLeft.classList.add('hidden');
    panelRight.classList.remove('hidden');
    tabChapter.classList.add('active');
    tabSearch.classList.remove('active');
  }
}

// On desktop always show both panels
window.addEventListener('resize',()=>{
  if(!isMobile()){
    panelLeft.classList.remove('hidden');
    panelRight.classList.remove('hidden');
  }
});

// ── PDF ──────────────────────────────────────────────────────────────────────
async function ensurePdf(){
  if(pdfDoc) return true;
  try{
    loadingText.textContent='Connecting to PDF…';
    pdfDoc=await pdfjsLib.getDocument({url:PDF_URL,rangeChunkSize:65536}).promise;
    return true;
  } catch(e){return false;}
}

async function renderPage(n){
  if(!pdfDoc) return;
  if(renderTask){try{renderTask.cancel();}catch(e){}}
  const page=await pdfDoc.getPage(n);
  // On mobile, fit to viewport width
  const maxW = pdfViewport.clientWidth - 20;
  const baseVp = page.getViewport({scale:1});
  const fitScale = Math.min(scale, maxW / baseVp.width);
  const vp=page.getViewport({scale: isMobile() ? fitScale : scale});
  pdfCanvas.width=vp.width; pdfCanvas.height=vp.height;
  renderTask=page.render({canvasContext:pdfCanvas.getContext('2d'),viewport:vp});
  try{await renderTask.promise;}catch(e){if(e.name!=='RenderingCancelledException')throw e;}
  currentPage=n;
  pageInfo.textContent=`${n} · ch.${n-chapterStart+1}/${chapterEnd-chapterStart+1}`;
  prevBtn.disabled=n<=chapterStart;
  nextBtn.disabled=n>=chapterEnd;
  pdfViewport.scrollTop=0;
}

async function selectChapter(idx){
  selectedIdx=idx;
  const c=CHAPTERS[idx];
  resultsList.querySelectorAll('.result-item').forEach(el=>el.classList.toggle('active',+el.dataset.idx===idx));
  chapterHeader.style.display='block';
  chapterEyebrow.textContent=c.part.replace(/^(Part|PART)\s+[\d:]+[A-Z]?\s*:\s*/i,'');
  chapterTitle.textContent=c.titel.replace(/^\d+:\s*/,'');
  chapterBadges.innerHTML=`<span class="badge badge-pages">pp.${c.start_sida}–${c.slut_sida}</span><span class="badge badge-count">${c.antal_sidor}p</span><span class="badge badge-section">${c.section.replace('Section ','§')}</span>`;
  welcomeState.style.display='none';errorState.style.display='none';
  pdfViewport.style.display='none';pdfNav.classList.remove('visible');
  loadingState.style.display='flex';loadingText.textContent='Loading chapter…';
  chapterStart=c.start_sida;chapterEnd=c.slut_sida;

  // On mobile, switch to chapter tab automatically
  if(isMobile()) switchTab('chapter');

  const ok=await ensurePdf();
  loadingState.style.display='none';
  if(!ok){errorText.textContent='Could not load the PDF from Cloudflare. Check that the file is uploaded and public access is enabled.';errorState.style.display='flex';return;}
  pdfViewport.style.display='flex';pdfNav.classList.add('visible');
  try{await renderPage(chapterStart);}
  catch(e){errorText.textContent=`Render error: ${e.message}`;errorState.style.display='flex';pdfViewport.style.display='none';pdfNav.classList.remove('visible');}
}

prevBtn.addEventListener('click',()=>{if(currentPage>chapterStart)renderPage(currentPage-1);});
nextBtn.addEventListener('click',()=>{if(currentPage<chapterEnd)renderPage(currentPage+1);});
zoomIn.addEventListener('click',()=>{scale=Math.min(scale+0.2,3);zoomLevel.textContent=Math.round(scale*100)+'%';renderPage(currentPage);});
zoomOut.addEventListener('click',()=>{scale=Math.max(scale-0.2,0.5);zoomLevel.textContent=Math.round(scale*100)+'%';renderPage(currentPage);});

// Swipe support on mobile
let touchStartX=0;
pdfViewport.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
pdfViewport.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>60){
    if(dx<0&&currentPage<chapterEnd) renderPage(currentPage+1);
    if(dx>0&&currentPage>chapterStart) renderPage(currentPage-1);
  }
},{passive:true});

document.addEventListener('keydown',e=>{
  if(document.activeElement===searchInput)return;
  if(e.key==='ArrowRight'&&currentPage<chapterEnd)renderPage(currentPage+1);
  if(e.key==='ArrowLeft'&&currentPage>chapterStart)renderPage(currentPage-1);
  if(e.key==='/'){{e.preventDefault();searchInput.focus();}}
});

// ── SEARCH & FILTER ──────────────────────────────────────────────────────────
function getFiltered(){
  let list=CHAPTERS;
  if(currentFilter!=='all'){const kws=SECTION_KEYWORDS[currentFilter];list=list.filter(c=>kws.some(kw=>(c.section+c.part).toUpperCase().includes(kw)));}
  if(currentQuery.trim()){const q=currentQuery.toLowerCase();list=list.filter(c=>c.titel.toLowerCase().includes(q)||c.part.toLowerCase().includes(q));}
  return list;
}
function hi(t,q){if(!q.trim())return t;const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return t.replace(new RegExp(`(${e})`,'gi'),'<mark>$1</mark>');}
function renderList(){
  const list=getFiltered();
  resultsHeader.textContent=list.length===CHAPTERS.length?`${CHAPTERS.length} entries`:`${list.length} of ${CHAPTERS.length}`;
  if(!list.length){resultsList.innerHTML=`<div class="empty-state">No chapters found</div>`;return;}
  resultsList.innerHTML=list.map(c=>{
    const idx=CHAPTERS.indexOf(c),active=idx===selectedIdx?' active':'';
    const name=hi(c.titel.replace(/^\d+:\s*/,''),currentQuery);
    const part=c.part.replace(/^(Part|PART)\s+[\d:]+[A-Z]?\s*:\s*/i,'');
    return `<div class="result-item${active}" data-idx="${idx}"><div class="result-num">${c.titel.match(/^(\d+)/)?.[1]??'—'}</div><div class="result-body"><div class="result-title">${name}</div><div class="result-meta">${part}</div></div><div class="result-pages">${c.start_sida}</div></div>`;
  }).join('');
  resultsList.querySelectorAll('.result-item').forEach(el=>el.addEventListener('click',()=>selectChapter(+el.dataset.idx)));
}
$('filterRow').addEventListener('click',e=>{const chip=e.target.closest('.filter-chip');if(!chip)return;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');currentFilter=chip.dataset.section;renderList();});
searchInput.addEventListener('input',()=>{currentQuery=searchInput.value;clearBtn.classList.toggle('visible',currentQuery.length>0);renderList();});
clearBtn.addEventListener('click',()=>{searchInput.value='';currentQuery='';clearBtn.classList.remove('visible');searchInput.focus();renderList();});

// Init
zoomLevel.textContent=Math.round(scale*100)+'%';
renderList();
</script>
</body>
</html>
